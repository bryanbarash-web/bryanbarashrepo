    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Dutchie Brand Guidelines 2026 */
        :root {
            --dark-green: #042017;
            --sand: #F1EBD6;
            --medium-green: #003D29;
            --purple: #5E324E;
            --light-green: #6AB448;
            --yellow: #FFC02A;
            --sand-dim: #d9d4c1;
            --dark-green-light: #0a3525;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: var(--sand);
            color: var(--dark-green);
            min-height: 100vh;
        }
        header {
            background: var(--dark-green);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo-area svg {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }
        .logo-text h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--sand);
        }
        .logo-text p {
            color: var(--sand-dim);
            font-size: 0.8rem;
            margin-top: 2px;
            opacity: 0.7;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            background: var(--dark-green-light);
            border: 1px solid var(--medium-green);
            border-radius: 8px;
            color: var(--sand);
            padding: 10px 16px 10px 40px;
            font-family: 'Inter', Arial, sans-serif;
            font-size: 0.9rem;
            width: 280px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input::placeholder { color: var(--sand-dim); opacity: 0.5; }
        .search-box input:focus { border-color: var(--light-green); }
        .search-box::before {
            content: "\1F50D";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px; }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }
        .filter-btn {
            background: transparent;
            border: 1.5px solid var(--dark-green);
            border-radius: 20px;
            color: var(--dark-green);
            padding: 8px 16px;
            font-family: 'Inter', Arial, sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            background: var(--dark-green);
            color: var(--sand);
        }
        .filter-btn.active {
            background: var(--dark-green);
            border-color: var(--dark-green);
            color: var(--sand);
        }

        /* Category sections */
        .category-section { margin-bottom: 40px; }
        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1.5px solid var(--dark-green);
            opacity: 0.9;
        }
        .category-icon {
            font-size: 1.3rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--dark-green);
            flex-shrink: 0;
        }
        .category-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-green);
        }
        .category-count {
            background: var(--dark-green);
            color: var(--sand);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 10px;
        }

        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .card {
            background: var(--dark-green);
            border: 1.5px solid var(--dark-green);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--sand);
            display: block;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(4,32,23,0.25);
            border-color: var(--medium-green);
        }
        .card-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--sand);
            margin-bottom: 6px;
        }
        .card-category-tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .card-desc {
            font-size: 0.8rem;
            color: var(--sand-dim);
            line-height: 1.4;
        }
        .card-arrow {
            margin-top: 12px;
            color: var(--light-green);
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Category tag colors — using brand palette */
        .cat-self .card-category-tag { background: rgba(255,192,42,0.25); color: var(--yellow); }
        .cat-pos .card-category-tag { background: var(--dark-green-light); color: var(--light-green); }
        .cat-ecommerce .card-category-tag { background: var(--purple); color: var(--sand); }
        .cat-payments .card-category-tag { background: var(--medium-green); color: var(--sand); }
        .cat-loyalty .card-category-tag { background: rgba(255,192,42,0.2); color: var(--yellow); }
        .cat-mobile .card-category-tag { background: var(--purple); color: var(--sand); }
        .cat-delivery .card-category-tag { background: var(--purple); color: var(--sand); }
        .cat-b2b .card-category-tag { background: rgba(106,180,72,0.15); color: var(--light-green); }
        .cat-analytics .card-category-tag { background: var(--medium-green); color: var(--light-green); }
        .cat-adjacent .card-category-tag { background: rgba(255,192,42,0.15); color: var(--yellow); }
        .card-status {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            margin-left: 6px;
            vertical-align: middle;
        }
        .status-defunct { background: rgba(239,106,74,0.2); color: #ef6a4a; }
        .status-absorbed { background: rgba(239,106,74,0.15); color: #ef8a6a; }
        .card-rooftops {
            font-size: 0.7rem;
            color: var(--sand-dim);
            opacity: 0.7;
            margin-top: 6px;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--dark-green);
            opacity: 0.5;
        }
        .no-results h3 { font-size: 1.2rem; margin-bottom: 8px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(4,32,23,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--sand);
            border: 1.5px solid var(--dark-green);
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
            color: var(--dark-green);
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--dark-green);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
            opacity: 0.5;
        }
        .modal-close:hover { opacity: 1; }
        .modal h2 { font-size: 1.4rem; color: var(--dark-green); margin-bottom: 8px; }
        .modal .modal-cat { margin-bottom: 16px; }
        .modal .modal-section { margin-bottom: 16px; }
        .modal .modal-section h3 {
            font-size: 0.8rem;
            color: var(--medium-green);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .modal .modal-section p {
            font-size: 0.9rem;
            color: var(--dark-green);
            line-height: 1.5;
        }
        .modal .btn-confluence {
            display: inline-block;
            background: var(--dark-green);
            color: var(--sand);
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 8px;
            transition: background 0.2s;
            font-family: 'Inter', Arial, sans-serif;
        }
        .modal .btn-confluence:hover { background: var(--medium-green); }

        /* Footer */
        footer {
            background: var(--dark-green);
            color: var(--sand);
            text-align: center;
            padding: 20px 32px;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            header { padding: 16px; }
            .container { padding: 16px; }
            .search-box input { width: 100%; }
            .modal { padding: 20px; margin: 16px; }
        }
    </style>
</head>

        const categoryOrder = [
            "Dutchie Self-Assessment",
            "POS & Retail Operations",
            "Ecommerce / Online Ordering",
            "Payments & Financial Services",
            "Loyalty / CRM / Marketing",
            "Mobile Apps",
            "Delivery Operations & Routing",
            "B2B / Wholesale Commerce",
            "Brand Intelligence & Analytics",
            "Adjacent / Marketplace"
        ];

        let activeFilter = "All";
        let searchQuery = "";

        function getCategories() {
            const cats = [...new Set(competitors.map(c => c.category))];
            return categoryOrder.filter(c => cats.includes(c));
        }

        function renderFilters() {
            const cats = getCategories();
            const el = document.getElementById("filters");
            el.innerHTML = `<button class="filter-btn ${activeFilter === 'All' ? 'active' : ''}" data-cat="All">All (${competitors.length})</button>` +
                cats.map(c => {
                    const count = competitors.filter(x => x.category === c).length;
                    return `<button class="filter-btn ${activeFilter === c ? 'active' : ''}" data-cat="${c}">${c} (${count})</button>`;
                }).join("");

            el.querySelectorAll(".filter-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    activeFilter = btn.dataset.cat;
                    render();
                });
            });
        }

        function render() {
            renderFilters();
            const filtered = competitors.filter(c => {
                const matchCat = activeFilter === "All" || c.category === activeFilter;
                const matchSearch = !searchQuery || c.name.toLowerCase().includes(searchQuery) || c.category.toLowerCase().includes(searchQuery) || c.desc.toLowerCase().includes(searchQuery);
                return matchCat && matchSearch;
            });

            const content = document.getElementById("content");
            const noResults = document.getElementById("no-results");

            if (filtered.length === 0) {
                content.innerHTML = "";
                noResults.style.display = "block";
                return;
            }
            noResults.style.display = "none";

            const groups = {};
            categoryOrder.forEach(cat => {
                const items = filtered.filter(c => c.category === cat);
                if (items.length > 0) groups[cat] = items;
            });

            content.innerHTML = Object.entries(groups).map(([cat, items]) => {
                const sample = items[0];
                return `
                <div class="category-section ${sample.catClass}">
                    <div class="category-header">
                        <div class="category-icon">${sample.icon}</div>
                        <h2>${cat}</h2>
                        <span class="category-count">${items.length}</span>
                    </div>
                    <div class="cards-grid">
                        ${items.map(c => `
                            <div class="card" data-name="${c.name}" onclick="openModal('${c.name.replace(/'/g, "\\'")}')">
                                <div class="card-name">${c.name}${c.status ? '<span class="card-status ' + (c.status.includes('DEFUNCT') || c.status.includes('ABSORBED') ? 'status-defunct' : 'status-absorbed') + '">' + c.status + '</span>' : ''}</div>
                                <span class="card-category-tag">${c.category}</span>
                                <div class="card-desc">${c.desc}</div>
                                ${c.rooftops ? '<div class="card-rooftops">Est. Rooftops: ' + c.rooftops + '</div>' : ''}
                                <div class="card-arrow">${c.url ? 'View Battlecard &rarr;' : 'No Battlecard Yet'}</div>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
            }).join("");
        }

        function openModal(name) {
            const c = competitors.find(x => x.name === name);
            if (!c) return;
            const modal = document.getElementById("modal");
            modal.innerHTML = `
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <h2>${c.name}${c.status ? '<span class="card-status ' + (c.status.includes('DEFUNCT') || c.status.includes('ABSORBED') ? 'status-defunct' : 'status-absorbed') + '" style="margin-left:10px">' + c.status + '</span>' : ''}</h2>
                <div class="modal-cat"><span class="card-category-tag" style="font-size:0.8rem">${c.icon} ${c.category}</span></div>
                <div class="modal-section">
                    <h3>Overview</h3>
                    <p>${c.desc}</p>
                </div>
                <div class="modal-section">
                    <h3>Product Categories</h3>
                    <p>${c.products}</p>
                </div>
                ${c.rooftops ? '<div class="modal-section"><h3>Estimated Rooftops</h3><p>' + c.rooftops + '</p></div>' : ''}
                <div class="modal-section">
                    <h3>Full Battlecard</h3>
                    <p>${c.url ? 'Access the complete competitive analysis including strengths, weaknesses, pricing, objection handling, and win/loss data on Confluence.' : 'No battlecard has been created for this competitor yet.'}</p>
                </div>
                ${c.url ? '<a class="btn-confluence" href="' + c.url + '" target="_blank" rel="noopener">Open in Confluence &rarr;</a>' : ''}
            `;
            document.getElementById("modal-overlay").classList.add("active");
        }

        function closeModal() {
            document.getElementById("modal-overlay").classList.remove("active");
        }

        document.getElementById("modal-overlay").addEventListener("click", function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") closeModal();
        });

        document.getElementById("search").addEventListener("input", function() {
            searchQuery = this.value.toLowerCase().trim();
            render();
        });

        render();
    </script>
