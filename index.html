<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dutchie Competitive Battlecards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Dutchie Brand Guidelines 2026 */
        :root {
            --dark-green: #042017;
            --sand: #F1EBD6;
            --medium-green: #003D29;
            --purple: #5E324E;
            --light-green: #6AB448;
            --yellow: #FFC02A;
            --sand-dim: #d9d4c1;
            --dark-green-light: #0a3525;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: var(--sand);
            color: var(--dark-green);
            min-height: 100vh;
        }
        header {
            background: var(--dark-green);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo-area svg {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }
        .logo-text h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--sand);
        }
        .logo-text p {
            color: var(--sand-dim);
            font-size: 0.8rem;
            margin-top: 2px;
            opacity: 0.7;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            background: var(--dark-green-light);
            border: 1px solid var(--medium-green);
            border-radius: 8px;
            color: var(--sand);
            padding: 10px 16px 10px 40px;
            font-family: 'Inter', Arial, sans-serif;
            font-size: 0.9rem;
            width: 280px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input::placeholder { color: var(--sand-dim); opacity: 0.5; }
        .search-box input:focus { border-color: var(--light-green); }
        .search-box::before {
            content: "\1F50D";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px; }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }
        .filter-btn {
            background: transparent;
            border: 1.5px solid var(--dark-green);
            border-radius: 20px;
            color: var(--dark-green);
            padding: 8px 16px;
            font-family: 'Inter', Arial, sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            background: var(--dark-green);
            color: var(--sand);
        }
        .filter-btn.active {
            background: var(--dark-green);
            border-color: var(--dark-green);
            color: var(--sand);
        }

        /* Category sections */
        .category-section { margin-bottom: 40px; }
        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1.5px solid var(--dark-green);
            opacity: 0.9;
        }
        .category-icon {
            font-size: 1.3rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--dark-green);
            flex-shrink: 0;
        }
        .category-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-green);
        }
        .category-count {
            background: var(--dark-green);
            color: var(--sand);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 10px;
        }

        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .card {
            background: var(--dark-green);
            border: 1.5px solid var(--dark-green);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--sand);
            display: block;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(4,32,23,0.25);
            border-color: var(--medium-green);
        }
        .card-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--sand);
            margin-bottom: 6px;
        }
        .card-category-tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .card-desc {
            font-size: 0.8rem;
            color: var(--sand-dim);
            line-height: 1.4;
        }
        .card-arrow {
            margin-top: 12px;
            color: var(--light-green);
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Category tag colors — using brand palette */
        .cat-pos .card-category-tag { background: var(--dark-green-light); color: var(--light-green); }
        .cat-payments .card-category-tag { background: var(--medium-green); color: var(--sand); }
        .cat-ecommerce .card-category-tag { background: var(--purple); color: var(--sand); }
        .cat-platform .card-category-tag { background: var(--dark-green-light); color: var(--sand); }
        .cat-marketing .card-category-tag { background: rgba(255,192,42,0.2); color: var(--yellow); }
        .cat-analytics .card-category-tag { background: var(--medium-green); color: var(--light-green); }
        .cat-delivery .card-category-tag { background: var(--purple); color: var(--sand); }
        .cat-supply .card-category-tag { background: rgba(106,180,72,0.15); color: var(--light-green); }
        .cat-seo .card-category-tag { background: rgba(255,192,42,0.15); color: var(--yellow); }
        .cat-mobile .card-category-tag { background: var(--purple); color: var(--sand); }
        .cat-self .card-category-tag { background: rgba(255,192,42,0.25); color: var(--yellow); }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--dark-green);
            opacity: 0.5;
        }
        .no-results h3 { font-size: 1.2rem; margin-bottom: 8px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(4,32,23,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--sand);
            border: 1.5px solid var(--dark-green);
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
            color: var(--dark-green);
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--dark-green);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
            opacity: 0.5;
        }
        .modal-close:hover { opacity: 1; }
        .modal h2 { font-size: 1.4rem; color: var(--dark-green); margin-bottom: 8px; }
        .modal .modal-cat { margin-bottom: 16px; }
        .modal .modal-section { margin-bottom: 16px; }
        .modal .modal-section h3 {
            font-size: 0.8rem;
            color: var(--medium-green);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .modal .modal-section p {
            font-size: 0.9rem;
            color: var(--dark-green);
            line-height: 1.5;
        }
        .modal .btn-confluence {
            display: inline-block;
            background: var(--dark-green);
            color: var(--sand);
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 8px;
            transition: background 0.2s;
            font-family: 'Inter', Arial, sans-serif;
        }
        .modal .btn-confluence:hover { background: var(--medium-green); }

        /* Footer */
        footer {
            background: var(--dark-green);
            color: var(--sand);
            text-align: center;
            padding: 20px 32px;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            header { padding: 16px; }
            .container { padding: 16px; }
            .search-box input { width: 100%; }
            .modal { padding: 20px; margin: 16px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <!-- Dutchie Group Hug logomark (light on dark) -->
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 0C8.954 0 0 8.954 0 20s8.954 20 20 20 20-8.954 20-20S31.046 0 20 0zm8.5 13.5c0 2.5-1.2 4.7-3 6.1 1.2 1.1 2 2.7 2 4.4 0 3.3-2.7 6-6 6-1.7 0-3.3-.7-4.4-1.9-1.1 1.2-2.7 1.9-4.4 1.9-3.3 0-6-2.7-6-6 0-1.8.8-3.4 2-4.5-1.8-1.4-3-3.6-3-6.1 0-4.1 3.4-7.5 7.5-7.5 2 0 3.9.8 5.3 2.2l-2.1 2.1c-.8-.8-2-1.3-3.2-1.3-2.5 0-4.5 2-4.5 4.5s2 4.5 4.5 4.5c1.5 0 2.8-.7 3.6-1.8l2.2 1.5c-.5.7-1.1 1.3-1.8 1.8.7.5 1.2 1.2 1.5 2 .5-.3 1-.8 1.3-1.3l2.2 1.5c-1.1 1.6-2.8 2.7-4.8 3-.1.5-.1 1-.1 1.5 0 1.7 1.3 3 3 3s3-1.3 3-3-1.3-3-3-3h-.5l-.5-2.9c3.7-.4 6.5-3.5 6.5-7.2 0-2.5-2-4.5-4.5-4.5-1.2 0-2.3.5-3.2 1.3l-2.1-2.1c1.4-1.3 3.3-2.2 5.3-2.2 4.1 0 7.5 3.4 7.5 7.5z" fill="#F1EBD6"/>
            </svg>
            <div class="logo-text">
                <h1>Competitive Battlecards</h1>
                <p>Dutchie Competitive Intelligence</p>
            </div>
        </div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Search competitors...">
        </div>
    </header>

    <div class="container">
        <div class="filters" id="filters"></div>
        <div id="content"></div>
        <div class="no-results" id="no-results" style="display:none">
            <h3>No competitors found</h3>
            <p>Try a different search or filter.</p>
        </div>
    </div>

    <footer>Dutchie &middot; Competitive Intelligence &middot; 2026</footer>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal"></div>
    </div>

    <script>
        const competitors = [
            { name: "Alleaves", category: "POS / Seed-to-Sale", catClass: "cat-pos", icon: "\uD83D\uDDA5\uFE0F", desc: "POS and compliance platform targeting regulated cannabis markets with seed-to-sale tracking", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968060457/Competitive+Battlecard+Alleaves" },
            { name: "Alpine IQ (AIQ)", category: "Loyalty / Marketing", catClass: "cat-marketing", icon: "\uD83D\uDCE3", desc: "Cannabis loyalty, marketing, and CRM data platform", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968093185/Competitive+Battlecard+Alpine+IQ+AIQ" },
            { name: "BLAZE", category: "Full Platform", catClass: "cat-platform", icon: "\uD83D\uDDA5\uFE0F", desc: "Full-stack cannabis platform with POS, ecommerce, and delivery", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21967929354/Competitive+Battlecard+BLAZE" },
            { name: "CanPay", category: "Payments", catClass: "cat-payments", icon: "\uD83D\uDCB3", desc: "Debit payment solution for cannabis retailers", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21967962147/Competitive+Battlecard+CanPay" },
            { name: "Carrot", category: "Mobile Apps", catClass: "cat-mobile", icon: "\uD83D\uDCF1", desc: "Cannabis mobile app platform for dispensary customer engagement", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968060481/Competitive+Battlecard+Carrot" },
            { name: "Dispense (AIQ Ecommerce)", category: "Ecommerce", catClass: "cat-ecommerce", icon: "\uD83D\uDED2", desc: "Alpine IQ's ecommerce product for dispensary online ordering", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21967929374/Competitive+Battlecard+Dispense+AIQ+Ecommerce" },
            { name: "DopeApps", category: "Mobile Apps", catClass: "cat-mobile", icon: "\uD83D\uDCF1", desc: "Mobile app and ecommerce solutions for dispensaries", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968060485/Competitive+Battlecard+DopeApps" },
            { name: "GrowFlow", category: "POS / Seed-to-Sale", catClass: "cat-pos", icon: "\uD83D\uDDA5\uFE0F", desc: "POS, compliance, and seed-to-sale tracking platform", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968093206/Competitive+Battlecard+GrowFlow" },
            { name: "Headset", category: "Analytics / Data", catClass: "cat-analytics", icon: "\uD83D\uDCCA", desc: "Cannabis market data, analytics, and business intelligence", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21967929414/Competitive+Battlecard+Headset" },
            { name: "Hypur", category: "Payments", catClass: "cat-payments", icon: "\uD83D\uDCB3", desc: "Compliant payment and banking solutions for cannabis", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968093226/Competitive+Battlecard+Hypur" },
            { name: "Jane (iHeartJane)", category: "Ecommerce", catClass: "cat-ecommerce", icon: "\uD83D\uDED2", desc: "Cannabis ecommerce marketplace and online ordering platform", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968060437/Competitive+Battlecard+Jane+iHeartJane" },
            { name: "LeafLink", category: "Wholesale / B2B", catClass: "cat-supply", icon: "\uD83D\uDD17", desc: "B2B cannabis wholesale marketplace and supply chain platform", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21967929394/Competitive+Battlecard+LeafLink" },
            { name: "Listo", category: "POS", catClass: "cat-pos", icon: "\uD83D\uDDA5\uFE0F", desc: "Cannabis point-of-sale system for dispensary operations", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968093266/Competitive+Battlecard+Listo" },
            { name: "Onfleet", category: "Delivery / Logistics", catClass: "cat-delivery", icon: "\uD83D\uDE9A", desc: "Last-mile delivery management and logistics platform", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968093246/Competitive+Battlecard+Onfleet" },
            { name: "POSaBIT", category: "POS / Payments", catClass: "cat-pos", icon: "\uD83D\uDCB3", desc: "Cannabis payments platform with expanding POS solutions", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21967962127/Competitive+Battlecard+POSaBIT" },
            { name: "Rank Really High", category: "SEO / Digital Marketing", catClass: "cat-seo", icon: "\uD83D\uDD0D", desc: "Cannabis-focused SEO and digital marketing agency", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968060477/Competitive+Battlecard+Rank+Really+High" },
            { name: "Surfside", category: "AdTech / Marketing", catClass: "cat-marketing", icon: "\uD83D\uDCE3", desc: "Cannabis adtech, audience data, and marketing platform", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968093286/Competitive+Battlecard+Surfside" },
            { name: "Treez", category: "POS / Retail Platform", catClass: "cat-pos", icon: "\uD83D\uDDA5\uFE0F", desc: "Cannabis retail platform with POS, ecommerce, and payments", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968060417/Competitive+Battlecard+Treez" },
            { name: "Weedmaps", category: "Ecommerce / Marketplace", catClass: "cat-ecommerce", icon: "\uD83D\uDED2", desc: "Cannabis marketplace, listings, and ecommerce platform", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21968125953/Competitive+Battlecard+Weedmaps" },
            { name: "Dutchie (Self-Assessment)", category: "Self-Assessment", catClass: "cat-self", icon: "\uD83E\uDE9E", desc: "Dutchie from a competitor's perspective — strengths, weaknesses, and positioning as rivals see us", url: "https://dutchie.atlassian.net/wiki/spaces/MKG/pages/21966913735" }
        ];

        const categoryOrder = [
            "Self-Assessment",
            "POS / Seed-to-Sale", "POS", "POS / Payments", "POS / Retail Platform",
            "Full Platform", "Payments", "Ecommerce", "Ecommerce / Marketplace",
            "Loyalty / Marketing", "AdTech / Marketing",
            "Analytics / Data", "Delivery / Logistics", "Wholesale / B2B",
            "SEO / Digital Marketing", "Mobile Apps"
        ];

        let activeFilter = "All";
        let searchQuery = "";

        function getCategories() {
            const cats = [...new Set(competitors.map(c => c.category))];
            return categoryOrder.filter(c => cats.includes(c));
        }

        function renderFilters() {
            const cats = getCategories();
            const el = document.getElementById("filters");
            el.innerHTML = `<button class="filter-btn ${activeFilter === 'All' ? 'active' : ''}" data-cat="All">All (${competitors.length})</button>` +
                cats.map(c => {
                    const count = competitors.filter(x => x.category === c).length;
                    return `<button class="filter-btn ${activeFilter === c ? 'active' : ''}" data-cat="${c}">${c} (${count})</button>`;
                }).join("");

            el.querySelectorAll(".filter-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    activeFilter = btn.dataset.cat;
                    render();
                });
            });
        }

        function render() {
            renderFilters();
            const filtered = competitors.filter(c => {
                const matchCat = activeFilter === "All" || c.category === activeFilter;
                const matchSearch = !searchQuery || c.name.toLowerCase().includes(searchQuery) || c.category.toLowerCase().includes(searchQuery) || c.desc.toLowerCase().includes(searchQuery);
                return matchCat && matchSearch;
            });

            const content = document.getElementById("content");
            const noResults = document.getElementById("no-results");

            if (filtered.length === 0) {
                content.innerHTML = "";
                noResults.style.display = "block";
                return;
            }
            noResults.style.display = "none";

            const groups = {};
            categoryOrder.forEach(cat => {
                const items = filtered.filter(c => c.category === cat);
                if (items.length > 0) groups[cat] = items;
            });

            content.innerHTML = Object.entries(groups).map(([cat, items]) => {
                const sample = items[0];
                return `
                <div class="category-section ${sample.catClass}">
                    <div class="category-header">
                        <div class="category-icon">${sample.icon}</div>
                        <h2>${cat}</h2>
                        <span class="category-count">${items.length}</span>
                    </div>
                    <div class="cards-grid">
                        ${items.map(c => `
                            <div class="card" data-name="${c.name}" onclick="openModal('${c.name.replace(/'/g, "\\'")}')">
                                <div class="card-name">${c.name}</div>
                                <span class="card-category-tag">${c.category}</span>
                                <div class="card-desc">${c.desc}</div>
                                <div class="card-arrow">View Battlecard &rarr;</div>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
            }).join("");
        }

        function openModal(name) {
            const c = competitors.find(x => x.name === name);
            if (!c) return;
            const modal = document.getElementById("modal");
            modal.innerHTML = `
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <h2>${c.name}</h2>
                <div class="modal-cat"><span class="card-category-tag" style="font-size:0.8rem">${c.icon} ${c.category}</span></div>
                <div class="modal-section">
                    <h3>Overview</h3>
                    <p>${c.desc}</p>
                </div>
                <div class="modal-section">
                    <h3>Full Battlecard</h3>
                    <p>Access the complete competitive analysis including strengths, weaknesses, pricing, objection handling, and win/loss data on Confluence.</p>
                </div>
                <a class="btn-confluence" href="${c.url}" target="_blank" rel="noopener">Open in Confluence &rarr;</a>
            `;
            document.getElementById("modal-overlay").classList.add("active");
        }

        function closeModal() {
            document.getElementById("modal-overlay").classList.remove("active");
        }

        document.getElementById("modal-overlay").addEventListener("click", function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") closeModal();
        });

        document.getElementById("search").addEventListener("input", function() {
            searchQuery = this.value.toLowerCase().trim();
            render();
        });

        render();
    </script>
</body>
</html>
